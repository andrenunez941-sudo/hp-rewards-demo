<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Rewards Demo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="screen" id="welcome">

    <div class="logo">HP</div>

    <h1>HP Rewards Demo</h1>

    <p>Explora productos HP y gana puntos dentro de la demo.</p>

    <button onclick="showRegister()">Crear cuenta</button>
    <button class="secondary" onclick="showLogin()">Iniciar sesión</button>

</div>

<div class="screen hidden" id="register">

    <h2>Crear cuenta</h2>

    <input id="regPhone" type="text" placeholder="Número de teléfono">
    <input id="regPass" type="password" placeholder="Crear contraseña">

    <button onclick="register()">Registrarme</button>
    <button class="secondary" onclick="back()">Regresar</button>

</div>

<div class="screen hidden" id="login">

    <h2>Iniciar sesión</h2>

    <input id="logPhone" type="text" placeholder="Número de teléfono">
    <input id="logPass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
    <button class="secondary" onclick="back()">Regresar</button>

</div>

<div class="screen hidden" id="app">

    <h2>Bienvenido a HP Rewards</h2>

    <p id="userInfo"></p>

    <div class="card">
        <h3>HP Laptop Demo</h3>
        <p>Gana +30 puntos</p>
        <button onclick="earnPoints(30)">Obtener</button>
    </div>

    <div class="card">
        <h3>HP Gaming PC</h3>
        <p>Gana +55 puntos</p>
        <button onclick="earnPoints(55)">Obtener</button>
    </div>

    <div class="points">
        Puntos: <span id="points">0</span>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
